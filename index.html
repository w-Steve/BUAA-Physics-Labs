<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基物实验助手 - 导航页</title>
    <link rel="stylesheet" href="experiments/style.css">
    <script src="experiments/common.js"></script>
    <style>
        .container {
            max-width: 1200px;
            border-radius: var(--container-radius);
            padding: 2rem 2rem 1.5rem;
        }

        .header {
            margin-bottom: 1.5rem;
            padding-right: 160px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.9rem;
        }

        .dark-mode .header {
            border-bottom-color: #4a5568;
        }
        
        .header h1 {
            font-size: 2rem;
            font-weight: 500;
            color: #0f172a;
            margin-bottom: 0.35rem;
        }

        .dark-mode .header h1 {
            color: #f1f5f9;
        }
        
        .header p {
            color: #64748b;
            line-height: 1.6;
            font-size: 1rem;
        }

        .dark-mode .header p {
            color: #cbd5e1;
        }
        
        .semester-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.9rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .nav-link {
            margin-left: auto;
            color: #64748b;
            text-decoration: none;
            font-size: 1rem;
            padding: 0.55rem 0.8rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.65rem;
            background: #ffffff;
        }

        .nav-link:hover {
            color: #000000;
            background: #f4f4f0;
            border-color: #000000;
        }

        .dark-mode .nav-link {
            color: #e2e8f0;
            background: #4a5568;
            border-color: #718096;
        }

        .dark-mode .nav-link:hover {
            color: #f4f4f0;
            background: #171717;
        }
        
        .tab {
            border-radius: 0.65rem;
            padding: 0.55rem 1rem;
            font-size: 1rem;
        }
        
        .tab.active {
            background: #1e293b;
            color: #ffffff;
            border-color: #1e293b;
        }

        .dark-mode .tab.active {
            background: #5a67d8;
            color: #ffffff;
            border-color: #5a67d8;
        }
        
        .semester-content {
            display: none;
        }
        
        .semester-content.active {
            display: block;
            animation: fadeIn 0.25s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .lessons-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 0.55rem;
            margin-bottom: 1.5rem;
        }
        
        .lesson-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 0.65rem;
            padding: 0;
            overflow: hidden;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .dark-mode .lesson-card {
            background: #2d3748;
            border-color: #4a5568;
        }
        
        .lesson-card:hover {
            border-color: #94a3b8;
        }
        
        .lesson-header {
            display: grid;
            grid-template-columns: 2.4rem minmax(0, 1fr) auto;
            align-items: center;
            gap: 0.55rem;
            margin-bottom: 0;
            padding: 0.48rem 0.7rem;
            border-bottom: 1px solid #e2e8f0;
            background: #f8fafc;
        }

        .dark-mode .lesson-header {
            border-bottom-color: #4a5568;
            background: #374151;
        }
        
        .lesson-number {
            display: none;
        }

        .dark-mode .lesson-number {
            background: #f4f4f0;
        }
        
        .lesson-title {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 1rem;
            font-weight: 600;
            color: #0f172a;
            line-height: 1.3;
        }

        .dark-mode .lesson-title {
            color: #f1f5f9;
        }
        
        .experiments-list {
            list-style: none;
            display: grid;
            grid-template-columns: minmax(0, 1fr);
        }

        .lesson-kicker,
        .lesson-count {
            color: #64748b;
            font-size: 0.9rem;
            line-height: 1;
            white-space: nowrap;
        }

        .lesson-kicker {
            font-weight: 650;
            color: #000000;
            text-align: center;
        }

        .dark-mode .lesson-kicker {
            color: #f4f4f0;
        }

        .dark-mode .lesson-count {
            color: #cbd5e1;
        }
        
        .experiment-item {
            margin-bottom: 0;
            padding: 0;
            background: transparent;
            border-radius: 0;
            transition: background-color 0.2s, border-color 0.2s;
            border: none;
            border-bottom: 1px solid #edf2f7;
        }

        .dark-mode .experiment-item {
            background: transparent;
            border-bottom-color: #4a5568;
        }
        
        .experiment-item:hover {
            background: #f1f5f9;
        }

        .dark-mode .experiment-item:hover {
            background: #4a5568;
        }

        .experiment-item:last-child {
            margin-bottom: 0;
        }
        
        .experiment-link {
            text-decoration: none;
            color: #495057;
            font-weight: 500;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 0.65rem;
            padding: 0.46rem 0.7rem;
            min-height: 2.35rem;
        }

        .dark-mode .experiment-link {
            color: #e2e8f0;
        }
        
        .experiment-link:hover {
            color: #000000;
        }

        .dark-mode .experiment-link:hover {
            color: #f4f4f0;
        }

        .experiment-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 1rem;
        }

        .experiment-meta {
            white-space: nowrap;
            font-size: 0.9rem;
            font-variant-numeric: tabular-nums;
        }
        
        .experiment-id {
            display: none;
        }

        .dark-mode .experiment-id {
            background: #4a5568;
            color: #cbd5e1;
        }
        
        .footer {
            text-align: center;
            padding-top: 0.75rem;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .lessons-grid {
                grid-template-columns: minmax(0, 1fr);
            }

            .experiments-list {
                grid-template-columns: minmax(0, 1fr);
            }

            .experiment-link {
                grid-template-columns: minmax(0, 1fr);
                gap: 0.25rem;
            }

            .experiment-name {
                white-space: normal;
            }

            .lesson-title {
                white-space: normal;
            }

            .header {
                padding-right: 0;
                padding-top: 2.75rem;
            }
            
            .header h1 {
                font-size: 1.35rem;
            }
            
            .tab {
                flex: 1 1 0;
            }

            .nav-link {
                margin-left: 0;
                text-align: center;
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header site-header">
            <h1>基物实验助手</h1>
            <p>BUAA基础物理实验课程辅助工具</p>
        </div>
        
        <div class="semester-tabs">
            <button class="tab active" data-semester="up" aria-pressed="true" onclick="switchSemester('up', event)">基物实验上</button>
            <button class="tab" data-semester="down" aria-pressed="false" onclick="switchSemester('down', event)">基物实验下</button>
            <a class="nav-link" href="about.html">关于</a>
        </div>
        
        <!-- 上学期实验 -->
        <div id="semester-up" class="semester-content active">
            <div class="lessons-grid">
                <!-- 实验数据会通过JavaScript动态生成 -->
            </div>
        </div>
        
        <!-- 下学期实验 -->
        <div id="semester-down" class="semester-content">
            <div class="lessons-grid">
                <!-- 实验数据会通过JavaScript动态生成 -->
            </div>
        </div>
        
        <div class="footer">
            <p>&copy; 2026 基物实验助手</p>
        </div>
    </div>

    <script>
        // 实验数据配置
        const experimentConfig = {
            up: [
                {
                    id: 1,
                    name: '稳态法测量不良导体热导率',
                    experiments: [
                        { id: '1-1', name: '稳态法测量不良导体热导率', url: 'experiments/1-1.html' }
                    ]
                },
                {
                    id: 2,
                    name: '钢丝弹性模量与刚体转动惯量',
                    experiments: [
                        { id: '2-1', name: '拉伸法测量钢丝弹性模量', url: 'experiments/2-1.html' },
                        { id: '2-2', name: '扭摆法测量刚体转动惯量', url: 'experiments/2-2.html' },
                        { id: '2-3', name: '验证平行轴定理', url: 'experiments/2-3.html' }
                    ]
                },
                {
                    id: 3,
                    name: '示波器及其应用',
                    experiments: [
                        { id: '3-1', name: '振幅法测声速', url: 'experiments/3-1.html' },
                        { id: '3-2', name: '相位法测声速', url: 'experiments/3-2.html' }
                    ]
                },
                {
                    id: 4,
                    name: '电阻测量（电桥法）',
                    experiments: [
                        { id: '4-1', name: '双电桥法测量铜杆的电阻率', url: 'experiments/4-1.html' },
                        { id: '4-2', name: '自组惠斯通电桥法测电阻', url: 'experiments/4-2.html' }
                    ]
                },
                {
                    id: 5,
                    name: '分光仪的调整及应用',
                    experiments: [
                        { id: '5-1', name: '三棱镜顶角测量（反射法）', url: 'experiments/5-1.html' },
                        { id: '5-2', name: '最小偏向角法测量棱镜折射率', url: 'experiments/5-2.html' },
                        { id: '5-3', name: '掠入射法测量棱镜折射率', url: 'experiments/5-3.html' }
                    ]
                },
                {
                    id: 6,
                    name: '透镜焦距',
                    experiments: [
                        { id: '6-1', name: '共轭法测量凸透镜焦距', url: 'experiments/6-1.html' },
                        { id: '6-2', name: '自准直法测量凸透镜焦距', url: 'experiments/6-2.html' },
                        { id: '6-3', name: '自准直法测量凹透镜焦距', url: 'experiments/6-3.html' },
                        { id: '6-4', name: '自准直法测量凸面镜焦距', url: 'experiments/6-4.html' }
                    ]
                },
                {
                    id: 7,
                    name: '电位差计',
                    experiments: [
                        { id: '7-1', name: '自组电位差计测量干电池电动势', url: 'experiments/7-1.html' },
                    ]
                }
            ],
            down: [
                {
                    id: 9,
                    name: '磁光效应',
                    experiments: [
                        { id: '9-1', name: '电磁铁工作电流线性拟合', url: 'experiments/9-1.html' },
                        { id: '9-2', name: '正交消光法测费尔德常数', url: 'experiments/9-2.html' }
                    ]
                },
                {
                    id: 10,
                    name: '氢原子光谱',
                    experiments: [
                        { id: '10-1', name: '衍射光栅常数测量', url: 'experiments/10-1.html' },
                        { id: '10-2', name: '里德伯常数测量', url: 'experiments/10-2.html' }
                    ]
                },
                {
                    id: 11,
                    name: '双棱镜干涉',
                    experiments: [
                        { id: '11-1', name: '激光双棱镜干涉', url: 'experiments/11-1.html' },
                        { id: '11-2', name: '劳埃镜干涉测激光波长', url: 'experiments/11-2.html' }
                    ]
                },
                {
                    id: 12,
                    name: '迈克尔逊干涉',
                    experiments: [
                        { id: '12-1', name: '氦氖激光波长测量', url: 'experiments/12-1.html' },
                        { id: '12-2', name: '钠双线波长差测量', url: 'experiments/12-2.html' }
                    ]
                },
                {
                    id: 13,
                    name: '阿贝成像',
                    experiments: [
                        { id: '13-1', name: '一维光栅成像与滤波', url: 'experiments/13-1.html' },
                        { id: '13-2', name: 'θ 调制计算', url: 'experiments/13-2.html' }
                    ]
                }
            ]
        };

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            window.ExperimentUtils.ThemeManager.init();
            renderExperiments('up');
            renderExperiments('down');
            switchSemester(localStorage.getItem('site-semester') || 'up');
            window.ExperimentUtils.Community.loadIndexStats();
        });

        // 渲染实验列表
        function renderExperiments(semester) {
            const container = document.querySelector(`#semester-${semester} .lessons-grid`);
            const lessons = experimentConfig[semester];
            
            container.innerHTML = lessons.map(lesson => `
                <div class="lesson-card">
                    <div class="lesson-header">
                        <div class="lesson-kicker">${lesson.id}</div>
                        <div class="lesson-title">${lesson.name}</div>
                        <div class="lesson-count">${lesson.experiments.length} 项</div>
                    </div>
                    <ul class="experiments-list">
                        ${lesson.experiments.map(exp => `
                            <li class="experiment-item" data-exp-id="${exp.id}">
                                <a href="${exp.url}" class="experiment-link">
                                    <span class="experiment-name">${exp.name}</span>
                                    <span class="experiment-meta" data-rating-summary data-exp-id="${exp.id}">暂无评分</span>
                                </a>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `).join('');
        }

        // 切换学期
        function switchSemester(semester, event) {
            if (!document.getElementById(`semester-${semester}`)) {
                semester = 'up';
            }

            // 更新标签
            document.querySelectorAll('.tab').forEach(tab => {
                const isActive = tab.dataset.semester === semester;
                tab.classList.toggle('active', isActive);
                tab.setAttribute('aria-pressed', String(isActive));
            });
            
            // 更新内容
            document.querySelectorAll('.semester-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(`semester-${semester}`).classList.add('active');
            localStorage.setItem('site-semester', semester);
        }
    </script>
</body>
</html>
